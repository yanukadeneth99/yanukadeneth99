<svg xmlns="http://www.w3.org/2000/svg" width="130" height="160" viewBox="0 0 130 160" role="img" aria-label="Stream Monitor (Active)">
  <!-- Clip path for the fill so it respects the brick's rounded corners. -->
  <defs>
    <clipPath id="clip-stream-monitor">
      <rect x="1.5" y="1.5" width="127" height="157" rx="12.5" ry="12.5"/>
    </clipPath>
  </defs>

  <!-- Background fill rises from the bottom by fillPct of inner height. -->
  <g clip-path="url(#clip-stream-monitor)">
    <rect x="1.5" y="119.25" width="127" height="39.25" fill="#D29922" fill-opacity="0.22"/>
  </g>

  <!-- Brick outline. Stroke is solid in status colour; no fill so the
       interior fill shows through. -->
  <rect x="1.5" y="1.5" width="127" height="157" rx="12.5" ry="12.5" fill="none" stroke="#D29922" stroke-width="1.5"/>

  <circle cx="65" cy="42" r="24" fill="#D29922" fill-opacity="0.18" stroke="#D29922" stroke-width="1.5"/>
       <text x="65" y="50" font-size="22" font-weight="700" text-anchor="middle" fill="#E6EDF3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">S</text>

  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#E6EDF3" y="86">
    <tspan x="65" dy="0" text-anchor="middle">Stream</tspan><tspan x="65" dy="16" text-anchor="middle">Monitor</tspan>
  </text>

  <!-- Tiny status label at bottom, dimmed. -->
  <text x="65" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="500" fill="#D29922" text-anchor="middle" letter-spacing="1">ACTIVE</text>
</svg>