name: Update "Currently Building"

# Runs frequently so the README reflects recent activity, but not so often that
# we waste Actions minutes. Every 6 hours is the sweet spot for a profile README.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/scripts/update-building.mjs"
      - ".github/workflows/update-building.yml"

permissions:
  contents: write # required to commit README changes

# Shared concurrency group with the other README-writing workflows so they
# serialize against each other instead of racing on `git push`. Same group
# name across update-projects / update-building / update-x-posts.
concurrency:
  group: readme-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: node .github/scripts/update-building.mjs

      - name: Commit if changed
        # Pull-rebase before push protects against concurrent commits from
        # the snake/pacman workflows (they touch the output branch but also
        # cause GitHub to refresh refs we may have fetched).
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh currently-building block"
            git pull --rebase origin main
            git push
          else
            echo "No README changes."
          fi
