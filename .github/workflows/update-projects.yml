name: Update Projects Section

# Triggered whenever you edit shipped.json. Also exposed via workflow_dispatch
# in case you want to manually re-render (e.g. after editing the script).
on:
  push:
    branches: [main]
    paths:
      - ".github/data/shipped.json"
      - ".github/scripts/update-projects.mjs"
      - ".github/workflows/update-projects.yml"
  workflow_dispatch:

permissions:
  contents: write

# Serialize concurrent runs so two quick pushes don't race each other to
# `git push` on the same branch. cancel-in-progress is false so the later run
# waits for the earlier one and then re-renders against the latest state.
concurrency:
  group: readme-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - run: node .github/scripts/update-projects.mjs
      - name: Commit if changed
        # Pull-rebase before push handles the case where another workflow
        # (snake, pacman, sibling README updater) pushed between our checkout
        # and our push. Without this, we'd hit the "cannot lock ref" failure
        # whenever workflows overlap by even a few seconds.
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh projects section"
            git pull --rebase origin main
            git push
          else
            echo "No README changes."
          fi
