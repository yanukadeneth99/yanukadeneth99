name: Update Projects Section

# Triggered whenever you edit projects.json. Also exposed via workflow_dispatch
# in case you want to manually re-render (e.g. after editing the script).
#
# NOTE: counts.json and .github/assets/bricks/*.svg are deliberately NOT in
# `paths:` — they are *outputs* of this workflow. Including them would create
# a write-loop where every run triggers the next.
on:
  push:
    branches: [main]
    paths:
      - ".github/data/projects.json"
      - ".github/scripts/update-projects.mjs"
      - ".github/workflows/update-projects.yml"
  workflow_dispatch:

permissions:
  contents: write

# Shared readme-writer group serializes runs across all three README-writing
# workflows (projects/building/x-posts) so they queue instead of racing.
concurrency:
  group: readme-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - run: node .github/scripts/update-projects.mjs
      - name: Commit if changed
        # We stage README.md, counts.json, and the bricks asset directory.
        # `git diff --cached --quiet` exits 0 iff nothing staged → skip commit
        # cleanly (no empty-noise commits when the projects list is unchanged).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/data/counts.json .github/assets/bricks/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh projects bricks"
          git pull --rebase origin main
          git push
