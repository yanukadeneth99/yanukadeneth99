name: Update Stats SVGs

# Daily refresh of the self-hosted languages donut + monthly contributions
# bar chart. Daily is the right cadence — these numbers don't shift hour to
# hour. Also runs on script changes so a code edit visibly updates the chart.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/scripts/update-stats.mjs"
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

# Shared readme-writer group so this never races with other workflows.
concurrency:
  group: readme-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVGs
        env:
          # repository_owner is a GitHub-controlled value (the repo's owner
          # login), not user-supplied input — safe to surface via env.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: node .github/scripts/update-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/languages.svg .github/assets/contributions.svg
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: refresh stats SVGs"
          git pull --rebase origin main
          git push
