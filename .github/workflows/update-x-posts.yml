name: Update Top 3 X Posts

# Hourly cadence. X dedups identical post IDs within a 24h window, so even
# at 24 runs/day the actual billed posts ≈ unique posts in your window
# (~50/day) × $0.001 = ~$1.50/mo. The README only commits when ranking
# actually changes, so most hours produce zero noise.
#
# GitHub scheduled workflows can drift 5–15 min under load; that's fine for
# hourly cadence because the underlying X data also doesn't change minute-to-minute.
on:
  schedule:
    - cron: "0 * * * *" # every hour, on the hour
  workflow_dispatch:

permissions:
  contents: write

# Shared README-writer concurrency group — see other workflows for context.
concurrency:
  group: readme-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Run updater
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
        run: node .github/scripts/update-x-posts.mjs

      - name: Commit if changed
        # Stage README.md, the generated SVG, and the avatar cache. Use
        # `git diff --cached --quiet` so we don't push empty commits when
        # nothing actually changed (most hours).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/assets/x-posts.svg .github/data/x-cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh top X posts"
          git pull --rebase origin main
          git push
