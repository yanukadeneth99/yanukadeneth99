name: Update Top 3 X Posts

# Daily cadence. Engagement on the top-3 posts barely shifts hour to hour,
# and X charges $0.001 per post returned — once daily × 50 posts × $0.001
# = ~$0.05/mo instead of ~$1.50/mo at hourly. Same data freshness for the
# README (people check profiles rarely enough that "today's top 3" is
# always the right answer).
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

# Shared README-writer concurrency group — see other workflows for context.
concurrency:
  group: readme-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Run updater
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
        run: node .github/scripts/update-x-posts.mjs

      - name: Commit if changed
        # Stage README.md, the per-tweet SVG directory, and the avatar cache.
        # `--all` on the bricks dir captures deletions (when ranking shifts).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all README.md .github/assets/x-posts/ .github/data/x-cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh top X posts"
          git pull --rebase origin main
          git push
